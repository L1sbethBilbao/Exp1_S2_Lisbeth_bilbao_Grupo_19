spring.application.name=minimarket
# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT (use env var in production)
jwt.secret=MiniMarketPlusSemana2ClaveSecretaJWT256BitsMinimaSegura2026
jwt.expiration=86400000

# Login attempt (anti brute force)
security.login.max-attempts=5
security.login.lock-minutes=15

# Rate limit auth endpoints
security.rate-limit.auth-per-minute=30

# MFA TOTP
security.mfa.issuer=MiniMarketPlus
security.mfa.token-expiration-ms=300000

# Data retention / anonymization
data.retention.enabled=true
data.retention.inactive-days=90
data.retention.cron=0 0 2 * * *
